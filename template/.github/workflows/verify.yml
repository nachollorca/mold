# This workflow runs all per-file checks (via prek) and the test suite for every push.
# prek.toml is the single source of truth for hook versions and per-file checks;
# this workflow only orchestrates `prek run --all-files` and `just test`.

name: verify

on:
  push:
    branches-ignore: # avoid running on main
      - main # verify should run on the feat branch, in main only tested stuff should be merged, then release is triggered

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  run:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install the project (frozen)
        run: just install

      - name: Run prek hooks
        uses: j178/prek-action@v1
        with:
          extra-args: --show-diff-on-failure --color always

      - name: Run tests
        run: just test
